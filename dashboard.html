<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TZR Dashboard — OktoBuzz</title>
  <link rel="icon" type="image/png" href="circle.png?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #13131A;
      --body: #3C3C46;
      --muted: #88888F;
      --bg: #F5F5F0;
      --card: #ffffff;
      --border: #E4E4E0;
      --red: #CC1F26;
      --green: #22C55E;
      --amber: #F59E0B;
      --sans: 'DM Sans', sans-serif;
    }

    [data-theme="dark"] {
      --ink: #F0F0F0;
      --body: #B0B0B8;
      --muted: #66666E;
      --bg: #0E0E12;
      --card: #1A1A22;
      --border: #2A2A34;
      --red: #E5343C;
      --green: #22C55E;
      --amber: #F59E0B;
    }

    [data-theme="dark"] .pill-strong  { background: #14532D; color: #4ADE80; }
    [data-theme="dark"] .pill-average { background: #451A03; color: #FCD34D; }
    [data-theme="dark"] .pill-poor    { background: #450A0A; color: #F87171; }
    [data-theme="dark"] .pill-unknown { background: var(--bg); color: var(--muted); }
    [data-theme="dark"] .rank-num.top3 { background: #451A03; border-color: #78350F; color: #FCD34D; }
    [data-theme="dark"] .export-btn { background: #14532D; border-color: #166534; color: #4ADE80; }
    [data-theme="dark"] .export-btn:hover { background: #166534; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Password Gate ───────────────────────────────── */
    #gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .gate-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .gate-logo {
      width: 48px;
      height: 48px;
      background: var(--red);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .gate-card h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .gate-card p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .gate-input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .gate-input-wrap .gate-input {
      margin-bottom: 0;
      padding-right: 44px;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .eye-btn:hover { color: var(--ink); }

    .gate-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      font-family: var(--sans);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      color: var(--ink);
      background: var(--bg);
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }

    .gate-input:focus { border-color: var(--ink); }

    .gate-btn {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--sans);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .gate-btn:hover { opacity: 0.85; }

    .gate-error {
      font-size: 13px;
      color: var(--red);
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ───────────────────────────────────── */
    #dashboard { display: none; }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
    }

    .topbar h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }

    .logout-btn {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .logout-btn:hover { background: var(--bg); color: var(--ink); }

    .theme-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .theme-btn:hover { background: var(--border); color: var(--ink); }

    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Stat Cards ──────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .stats-grid { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 38px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .stat-card.green .stat-value { color: #16A34A; }
    .stat-card.amber .stat-value { color: #D97706; }
    .stat-card.red-val .stat-value { color: var(--red); }

    /* ── Chart Section ───────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
    @media (max-width: 800px) { .rev-grid { grid-template-columns: 1fr !important; } }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .chart-card h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bar-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--body);
      width: 90px;
      flex-shrink: 0;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 10px;
      background: var(--bg);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }

    .bar-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      width: 32px;
      text-align: right;
    }

    /* ── Revenue Chart ───────────────────────────────── */
    .rev-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .rev-card h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 20px;
    }

    /* ── Table ───────────────────────────────────────── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .table-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-header h3 { font-size: 15px; font-weight: 700; color: var(--ink); }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #FAFAF8; }

    tbody td {
      padding: 12px 16px;
      color: var(--body);
      vertical-align: middle;
    }

    .td-name { font-weight: 600; color: var(--ink); }
    .td-brand { color: var(--muted); font-size: 12px; }

    .score-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .pill-strong  { background: #DCFCE7; color: #16A34A; }
    .pill-average { background: #FEF3C7; color: #D97706; }
    .pill-poor    { background: #FEE2E2; color: #DC2626; }
    .pill-unknown { background: var(--bg); color: var(--muted); }

    .rank-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
    }

    .rank-num.top3 { background: #FEF3C7; border-color: #FDE68A; color: #B45309; }

    .platform-tag {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 500;
      color: var(--body);
      margin: 1px 2px;
    }

    .score-num {
      font-weight: 800;
      font-size: 15px;
    }

    .score-num.strong  { color: #16A34A; }
    .score-num.average { color: #D97706; }
    .score-num.poor    { color: #DC2626; }
    .score-num.unknown { color: var(--muted); }

    /* ── Search box ──────────────────────────────────── */
    .search-box {
      padding: 8px 14px;
      font-size: 13px;
      font-family: var(--sans);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      color: var(--ink);
      background: var(--bg);
      width: 220px;
      transition: border-color 0.15s;
    }

    .search-box:focus { border-color: var(--ink); }

    /* ── Empty state ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Loading spinner ─────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Refresh btn ─────────────────────────────────── */
    .refresh-btn {
      font-size: 13px;
      font-weight: 600;
      color: var(--body);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: var(--sans);
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: var(--border); }

    .export-btn {
      font-size: 13px;
      font-weight: 600;
      color: #16A34A;
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: var(--sans);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .export-btn:hover { background: #DCFCE7; }
  </style>
</head>
<body>

<!-- ── Password Gate ────────────────────────────────────── -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">TZ</div>
    <h1>Applications Dashboard</h1>
    <p>The Zero Retainer &nbsp;·&nbsp; OktoBuzz</p>
    <div class="gate-input-wrap">
      <input
        type="password"
        id="gate-password"
        class="gate-input"
        placeholder="Enter password"
        autocomplete="current-password"
      />
      <button class="eye-btn" type="button" onclick="toggleEye(this)" tabindex="-1" aria-label="Show password">
        <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <button class="gate-btn" onclick="login()">Unlock Dashboard</button>
    <p class="gate-error" id="gate-error">Wrong password. Try again.</p>
  </div>
</div>

<!-- ── Dashboard ───────────────────────────────────────── -->
<div id="dashboard">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <h1>The Zero Retainer &nbsp;·&nbsp; Applications</h1>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge" id="last-updated">—</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="main" id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      Loading applications…
    </div>
  </div>

</div>

<script>
  function toggleEye(btn) {
    const input = document.getElementById('gate-password');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.querySelector('svg').innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  let storedPassword = '';
  let allApplications = [];

  // ── Theme ────────────────────────────────────────────────
  const sunIcon = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>`;
  const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

  function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('theme-icon').innerHTML = dark ? sunIcon : moonIcon;
    localStorage.setItem('tzr-theme', dark ? 'dark' : 'light');
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
  }

  // Apply saved theme on load
  applyTheme(localStorage.getItem('tzr-theme') === 'dark');

  // ── Auth ────────────────────────────────────────────────
  function login() {
    const pass = document.getElementById('gate-password').value.trim();
    if (!pass) return;
    storedPassword = pass;
    document.getElementById('gate-error').style.display = 'none';
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  }

  document.getElementById('gate-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    storedPassword = '';
    allApplications = [];
    document.getElementById('gate').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('gate-password').value = '';
  }

  // ── Load data ───────────────────────────────────────────
  async function loadData() {
    document.getElementById('main-content').innerHTML = `
      <div class="loading"><div class="spinner"></div>Loading applications…</div>
    `;

    try {
      const res = await fetch('/api/dashboard?password=' + encodeURIComponent(storedPassword));
      if (res.status === 401) {
        document.getElementById('gate').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('gate-error').style.display = 'block';
        document.getElementById('gate-error').textContent = 'Wrong password.';
        return;
      }
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Unknown error');

      allApplications = data.applications || [];
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

      renderDashboard(data);
    } catch (err) {
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">Failed to load data: ${err.message}</div>
      `;
    }
  }

  // ── Render ──────────────────────────────────────────────
  function renderDashboard(data) {
    const strong  = data.scoreDist.Strong  || 0;
    const average = data.scoreDist.Average || 0;
    const poor    = data.scoreDist.Poor    || 0;
    const total   = data.total || 0;

    document.getElementById('main-content').innerHTML = `

      <!-- Stat cards -->
      <p class="section-title" style="margin-bottom:16px;">Overview</p>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Applications</div>
          <div class="stat-value">${total}</div>
          <div class="stat-sub">All time submissions</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Score</div>
          <div class="stat-value">${data.avgScore}</div>
          <div class="stat-sub">out of 10</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Strong Fit</div>
          <div class="stat-value">${strong}</div>
          <div class="stat-sub">${total ? ((strong/total)*100).toFixed(0) : 0}% of applicants</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-label">Average Fit</div>
          <div class="stat-value">${average}</div>
          <div class="stat-sub">${total ? ((average/total)*100).toFixed(0) : 0}% of applicants</div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card">
          <h3>Score Distribution</h3>
          ${renderBarChart([
            { label: 'Strong',  count: strong,  color: '#22C55E' },
            { label: 'Average', count: average, color: '#F59E0B' },
            { label: 'Poor',    count: poor,    color: '#EF4444' },
          ], total)}
        </div>
        <div class="chart-card">
          <h3>Platform Presence</h3>
          ${renderBarChart(
            Object.entries(data.platforms).map(([label, count]) => ({
              label, count, color: '#CC1F26'
            })),
            total
          )}
        </div>
      </div>

      <!-- Revenue Distribution -->
      <div class="rev-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;">
        <div class="rev-card" style="margin-bottom:0;">
          <h3>Online Revenue Distribution</h3>
          ${renderRevChart(data.onlineRevDist, total, 'online')}
        </div>
        <div class="rev-card" style="margin-bottom:0;">
          <h3>Offline Revenue Distribution</h3>
          ${renderRevChart(data.offlineRevDist, total, 'offline')}
        </div>
      </div>

      <!-- Top 10 Candidates -->
      <p class="section-title">Top 10 Candidates</p>
      <div class="table-card" style="margin-bottom:32px;">
        <div class="table-wrap">
          ${renderTop10Table(data.top10)}
        </div>
      </div>

      <!-- All Responses -->
      <p class="section-title">All Applications</p>
      <div class="table-card">
        <div class="table-header">
          <h3>All Responses <span style="color:var(--muted);font-weight:500;font-size:13px;">(${total})</span></h3>
          <div style="display:flex;align-items:center;gap:10px;">
            <input
              type="text"
              class="search-box"
              placeholder="Search name, brand, email…"
              oninput="filterTable(this.value)"
              id="search-input"
            />
            <button class="export-btn" onclick="exportToExcel()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export Excel
            </button>
          </div>
        </div>
        <div class="table-wrap" id="all-table-wrap">
          ${renderAllTable(allApplications)}
        </div>
      </div>
    `;
  }

  function renderBarChart(items, total) {
    if (!items.length || !total) return '<p style="color:var(--muted);font-size:13px;">No data yet.</p>';
    const max = Math.max(...items.map(i => i.count), 1);
    return items.map(({ label, count, color }) => `
      <div class="bar-row">
        <div class="bar-label">${label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(count/max)*100}%;background:${color}"></div>
        </div>
        <div class="bar-count">${count}</div>
      </div>
    `).join('');
  }

  function renderRevChart(dist, total, type) {
    if (!dist || !Object.keys(dist).length) return '<p style="color:var(--muted);font-size:13px;">No data yet.</p>';
    const onlineOrder = [
      'Less than ₹5 lakh','₹5L – ₹25L','₹25L – ₹50L',
      '₹50L – ₹1 crore','₹1 Cr – ₹3 Cr','₹3 Cr – ₹5 Cr',
      'More than ₹5 Cr','Not Selling'
    ];
    const offlineOrder = [
      'Below ₹50L/month','₹50L–₹75L/month','Above ₹75L/month'
    ];
    const order = type === 'offline' ? offlineOrder : onlineOrder;
    const items = order
      .filter(k => dist[k])
      .map(k => ({ label: k, count: dist[k] }));
    // Also include any keys not in order (fallback)
    Object.keys(dist).forEach(k => {
      if (!order.includes(k)) items.push({ label: k, count: dist[k] });
    });
    if (!items.length) return '<p style="color:var(--muted);font-size:13px;">No data yet.</p>';
    const max = Math.max(...items.map(i => i.count), 1);
    const color = type === 'offline' ? '#6366F1' : '#CC1F26';
    return items.map(({ label, count }) => `
      <div class="bar-row">
        <div class="bar-label" style="width:140px;font-size:12px;text-align:right;">${label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(count/max)*100}%;background:${color}"></div>
        </div>
        <div class="bar-count">${count}</div>
      </div>
    `).join('');
  }

  function pillClass(label) {
    if (!label) return 'pill-unknown';
    const l = label.toLowerCase();
    if (l === 'strong') return 'pill-strong';
    if (l === 'average') return 'pill-average';
    if (l === 'poor') return 'pill-poor';
    return 'pill-unknown';
  }

  function scoreClass(label) {
    if (!label) return 'unknown';
    const l = label.toLowerCase();
    if (l === 'strong') return 'strong';
    if (l === 'average') return 'average';
    if (l === 'poor') return 'poor';
    return 'unknown';
  }

  function renderTop10Table(apps) {
    if (!apps || !apps.length) return '<div class="empty-state">No applications yet.</div>';
    return `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Score</th>
            <th>Online Revenue</th>
            <th>Platforms</th>
          </tr>
        </thead>
        <tbody>
          ${apps.map((a, i) => `
            <tr>
              <td><span class="rank-num ${i < 3 ? 'top3' : ''}">${i+1}</span></td>
              <td>
                <div class="td-name">${esc(a.name || '—')}</div>
                <div class="td-brand">${esc(a.designation || '')}</div>
              </td>
              <td>${esc(a.brand || '—')}</td>
              <td>
                <span class="score-num ${scoreClass(a.score_label)}">${a.score != null ? parseFloat(a.score).toFixed(1) : '—'}</span>
                &nbsp;<span class="score-pill ${pillClass(a.score_label)}">${a.score_label || '—'}</span>
              </td>
              <td style="font-size:12px;">${esc(a.online_revenue || '—')}</td>
              <td>${(a.platforms_present||[]).map(p => `<span class="platform-tag">${p}</span>`).join('')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderAllTable(apps) {
    if (!apps || !apps.length) return '<div class="empty-state">No applications yet.</div>';
    return `
      <table id="all-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Email</th>
            <th>Score</th>
            <th>Online Revenue</th>
            <th>Offline Revenue</th>
            <th>Platforms</th>
          </tr>
        </thead>
        <tbody>
          ${apps.map(a => `
            <tr
              data-search="${esc((a.name||'') + ' ' + (a.brand||'') + ' ' + (a.email||'')).toLowerCase()}"
            >
              <td style="white-space:nowrap;font-size:12px;color:var(--muted);">
                ${a.submitted_at ? new Date(a.submitted_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'}
              </td>
              <td>
                <div class="td-name">${esc(a.name || '—')}</div>
                <div class="td-brand">${esc(a.designation || '')}</div>
              </td>
              <td>${esc(a.brand || '—')}</td>
              <td style="font-size:12px;">${esc(a.email || '—')}</td>
              <td>
                <span class="score-num ${scoreClass(a.score_label)}">${a.score != null ? parseFloat(a.score).toFixed(1) : '—'}</span>
                &nbsp;<span class="score-pill ${pillClass(a.score_label)}">${esc(a.score_label || '—')}</span>
              </td>
              <td style="font-size:12px;">${esc(a.online_revenue || '—')}</td>
              <td style="font-size:12px;">${esc(a.offline_revenue || '—')}</td>
              <td>${(a.platforms_present||[]).map(p => `<span class="platform-tag">${p}</span>`).join('')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function filterTable(query) {
    const q = query.toLowerCase().trim();
    const rows = document.querySelectorAll('#all-table tbody tr');
    rows.forEach(row => {
      const val = (row.getAttribute('data-search') || '').toLowerCase();
      row.style.display = q === '' || val.includes(q) ? '' : 'none';
    });
  }

  function exportToExcel() {
    if (!allApplications.length) return alert('No data to export.');

    const rows = allApplications.map((a, i) => ({
      '#':                i + 1,
      'Submitted At':     a.submitted_at ? new Date(a.submitted_at).toLocaleString('en-IN') : '',
      'Name':             a.name || '',
      'Designation':      a.designation || '',
      'Brand':            a.brand || '',
      'Email':            a.email || '',
      'Score':            a.score != null ? parseFloat(a.score).toFixed(1) : '',
      'Score Label':      a.score_label || '',
      'Online Revenue':   a.online_revenue || '',
      'Offline Revenue':  a.offline_revenue || '',
      'Platforms':        (a.platforms_present || []).join(', '),
      'One Liner':        a.one_liner || '',
    }));

    const ws = XLSX.utils.json_to_sheet(rows);

    // Column widths
    ws['!cols'] = [
      {wch:4},{wch:18},{wch:22},{wch:18},{wch:22},{wch:28},
      {wch:8},{wch:12},{wch:20},{wch:20},{wch:30},{wch:40}
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Applications');

    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `TZR-Applications-${date}.xlsx`);
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
